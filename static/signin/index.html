<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Sign In</title>
	<link rel="stylesheet" href="/style.css">
  <style>
    html{
        background: url('../sky.jpeg') no-repeat center center fixed;
  background-size: cover;
  overflow: hidden;
    }

    .background-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
  </style>
</head>
<body>
<div class="background-container">
  <div class="card">
    <h1>Sign in</h1>
    <p>Use your username and password to continue.</p>
    
    <form>
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Username">
      </div>
      
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••">
      </div>
      
      <div class="options">
        <label><input type="checkbox" name="rememberMe"> Remember me</label>
      </div>
      
      <button type="button">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>

<script>
  const params = new URLSearchParams(window.location.search);
  document.querySelector('form button').addEventListener('click', async () => {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const body = new URLSearchParams({ username, password });
    const res = await fetch('/signin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body.toString()
    });

    if (res.ok) {
      window.location.href = decodeURIComponent(params.get('redirect') || '%2F');
    } else {
      alert('Invalid credentials. Please try again.');
    }
  });
</script>
