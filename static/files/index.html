<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/style.css">
    <script src="../nav.js"></script>
    <link rel="stylesheet" href="../icons.css">
      <link href="./icons.css" rel="stylesheet">
</head>
<style>
ul {
    list-style-type: none;
    padding: 0;
    margin: 0;
}

li {
    padding: 12px 16px;
    cursor: pointer;

    /* Glass feel without background */
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    
    /* Subtle blur to interact with parent background */

    /* Smooth transitions */
    transition: all 0.25s ease;

    /* Slight rounding for modern look */
    border-radius: 8px;
}

/* Hover effect */
li:hover {
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    transform: translateX(4px);

    /* very subtle highlight without full background */
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
}

/* Optional: last item cleanup */
li:last-child {
    border-bottom: none;
}

select{
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(229, 229, 229, 0.305) !important;
    color: #000;
    transition: all 0.25s ease;
    outline: none;
    float: right;
    margin-right: 10px;
}
</style>

<body>
<nav-bar>
</nav-bar>

<br><br>
<div id="custom-menu" class="context-menu">
  <ul>
    <li onclick="ctx_download()">Download</li>
    <li onclick="ctx_open()">Open in new tab</li>
    <hr id="opnhr">
    <li onclick="ctx_share()">Copy share link</li>
    <li onclick="ctx_copy_path()">Copy URL</li>
    <hr id="edhr">
    <li onclick="ctx_rename()" id="renameb">Rename</li>
    <li onclick="ctx_move()" id="moveb">Move</li>
    <hr id="delhr">
    <li style="color: red;" id="deleteb" onclick="ctx_delete()">Trash</li>
  </ul>
</div>


    <div class="card">
        <h2><span id="title">File Explorer</span>
            <input type="file" id="file-input" style="display:none" onchange="uploadFile(event)" />
        <select id="drive-select" onchange="location.href = '?drive=' + this.value + '&path=' + encodeURIComponent('/')">
            <option id="sel" value="">Select a drive</option>
        </select>
        <i class="material-symbols-rounded" onclick="upload()" id="uploadb" style="cursor: pointer;float: right;margin-top: 5px;margin-right: 10px;">upload</i>
        <i class="material-symbols-rounded" onclick="search()" id="searchb" style="cursor: pointer;float: right;margin-top: 5px;margin-right: 10px;">search</i>
        </h2>
        <ul>
        </ul>
    </div>
</body>
<script>
const bytesToHumanReadable = (bytes) => {
    if (bytes === 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    let i = Math.floor(Math.log(bytes) / Math.log(1024));
    return parseFloat((bytes / Math.pow(1024, i)).toFixed(2)) + ' ' + units[i];
};

let selPath = '';

let showHidden = false;
const toggleHidden = () => {
    showHidden = !showHidden;
    const ul = document.querySelector('.card ul');
    Array.from(ul.children).forEach(li => {
        if(li.textContent.trim().startsWith('.')) {
            li.style.display = showHidden ? '' : 'none';
        }
    });
};

window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const currentDrive = params.get('drive');
    const currentPath = params.get('path') || '/';

    // 1. Load Drives
    const drivesReq = await fetch('/drives');
    const drivesData = await drivesReq.json();
    const driveSelect = document.getElementById('drive-select');

    const permreq = await fetch('/mypermissions')
    const myPerms = await permreq.json();

    if(!myPerms.write){
        document.getElementById('uploadb').style.display = 'none';
        document.getElementById('renameb').style.display = 'none';
        document.getElementById('moveb').style.display = 'none';
        document.getElementById('edhr').style.display = 'none';
    }

    if(!myPerms.delete){
        document.getElementById('deleteb').style.display = 'none';
        document.getElementById('delhr').style.display = 'none';
    }
    
    drivesData.drives.forEach(drive => {
        const option = document.createElement('option');
        option.value = drive.name;
        option.textContent = drive.name;
        if(currentDrive === drive.name) option.selected = true;
        driveSelect.appendChild(option);
    });

    if(!currentDrive) {
        document.getElementById('title').textContent = 'Please select a drive';
        document.getElementById('uploadb').style.display = 'none';
        document.getElementById('searchb').style.display = 'none';
         return;
    }

    // 2. Load Files
    const req = await fetch(`/files/json?drive=${currentDrive}&path=${encodeURIComponent(currentPath)}`);
    const data = await req.json();
    const ul = document.querySelector('.card ul');

    // Add ".." (Go Back) entry if not in root
    if (currentPath !== '/' && currentPath !== '.') {
        const backLi = document.createElement('li');
        backLi.innerHTML = `<strong>📁 .. (Go Back)</strong>`;
        backLi.onclick = () => {
            const parts = currentPath.split('/').filter(Boolean);
            parts.pop();
            const parentPath = '/' + parts.join('/');
            location.href = `?drive=${currentDrive}&path=${encodeURIComponent(parentPath)}`;
        };
        ul.appendChild(backLi);
    }

    data.files.filter(e => !e.name.includes('.trash')).forEach(file => {
        const fileLi = document.createElement('li');
        const icon = file.isDirectory ? '📁' : '📄';
        const info = file.isDirectory ? 'Directory' : bytesToHumanReadable(file.size);
        
        fileLi.innerHTML = `
            <span>${icon} <strong>${file.name}</strong></span>
            <span style="float:right; font-size: 0.8em; opacity: 0.7;">
            ${info} | ${new Date(file.modified).toLocaleDateString()}
            </span>
        `;

        if(fileLi.textContent.trim().startsWith('.')) {
            fileLi.style.display = 'none';
        }

        fileLi.onclick = () => {
            if(file.isDirectory) {
                location.href = `?drive=${currentDrive}&path=${encodeURIComponent(file.path)}`;
            } else {
                location.href = `/files/raw?drive=${currentDrive}&path=${encodeURIComponent(file.path)}`;
            }
        };

fileLi.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  
  selPath = file.path;
  
  menu.style.top = `${e.pageY}px`;
  menu.style.left = `${e.pageX}px`;
  menu.style.display = 'block';
});

document.addEventListener('click', () => {
  menu.style.display = 'none';
});


        ul.appendChild(fileLi);
    });
};

const download = (drive, path) => {
    const link = document.createElement('a');
    link.href = `/files/raw?drive=${drive}&path=${path}`;
    link.download = decodeURIComponent(path).split('/').pop();
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
};

const upload = () => {
    document.getElementById('file-input').click();
};

const uploadFile = async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const params = new URLSearchParams(window.location.search);
    const currentDrive = params.get('drive');
    const currentPath = params.get('path') || '/';

    const formData = new FormData();
    formData.append('file', file);
    formData.append('drive', currentDrive);
    formData.append('path', currentPath);

    await fetch('/files/upload', {
        method: 'POST',
        body: formData
    });

    // Refresh the page after upload
    location.reload();
};

document.getElementById('file-input').addEventListener('change', uploadFile);

const searchb = document.getElementById('searchb');

const search = (q) => {
    const query = typeof q == 'string' ? q : prompt('Enter search query:');
    if (!query) return;
    const ul = document.querySelector('.card ul');
    document.getElementById('title').textContent = `Search Results for "${query}"`;
    document.getElementById('searchb').onclick = undoSearch;
    document.getElementById('searchb').textContent = 'search_off';
    Array.from(ul.children).forEach(li => {
        const text = li.textContent.toLowerCase();
        if (text.includes(query.toLowerCase())) {
            li.style.display = '';
        } else {
            li.style.display = 'none';
        }
    });
};

const undoSearch = () => {
    const ul = document.querySelector('.card ul');
    document.getElementById('title').textContent = 'File Explorer';
    document.getElementById('searchb').onclick = search;
    document.getElementById('searchb').textContent = 'search';
    Array.from(ul.children).forEach(li => {
        li.style.display = '';
    });
};

if(window.location.search.includes('search=')) {
    const params = new URLSearchParams(window.location.search);
    const query = params.get('search');
    search(query);
}

async function shareFile(drive, path) {
    try {
        let expiresin = prompt('Share link expiration in seconds (default 3600):');

        // sanitize input
        expiresin = parseInt(expiresin);
        if (isNaN(expiresin) || expiresin <= 0) {
            expiresin = 3600;
        }

        const res = await fetch('/files/share', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ drive, path, expiresin })
        });

        if (!res.ok) {
            throw new Error('Failed to create share link');
        }

        const data = await res.json();

        if (!data.shareId) {
            throw new Error('Invalid response from server');
        }

        const url = `${window.location.origin}/s/${data.shareId}`;

        setTimeout(async () => {
            
        try {
            await navigator.clipboard.writeText(url);
            alert(`Share link copied to clipboard! Link: ${url}`);
        } catch (err) {
            console.error(err);
                    alert(`Share link: ${url}`);
        }
        }, 500);
    } catch (err) {
        console.error(err);
        alert('Error creating share link');
    }
}

const menu = document.getElementById('custom-menu');

const currentDrive = new URLSearchParams(window.location.search).get('drive');

const ctx_delete = () => {
    if(confirm('Are you sure you want to delete this file?')) {
        fetch('/file', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ drive: currentDrive, path: selPath })
        }).then(() => location.reload());
    }
};

const ctx_share = () => {
    shareFile(currentDrive, selPath);
};

const ctx_download = () => {
    download(currentDrive, selPath);
};

const ctx_rename = () => {
    const newName = prompt('Enter new name:');
    if (!newName) return;

    fetch('/file/rename', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ drive: currentDrive, path: selPath, newName })
    }).then(() => location.reload());
};

const ctx_move = () => {
    const newPath = prompt('Enter new path (excluding filename):');
    if (!newPath) return;

    fetch('/file/move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ drive: currentDrive, path: selPath, newPath })
    }).then(() => location.reload());
};

const ctx_copy_path = () => {
    const fullPath = location.origin + `/files/raw?drive=${currentDrive}&path=${encodeURIComponent(selPath)}`;
    navigator.clipboard.writeText(fullPath).then(() => {
        alert(`Path copied to clipboard: ${fullPath}`);
    }).catch(err => {
        console.error(err);
        alert(`Failed to copy path. Path: ${fullPath}`);
    });
};

const ctx_open = () => {
    const url = location.origin + `/files/raw?drive=${currentDrive}&path=${encodeURIComponent(selPath)}`;
    window.open(url, '_blank');
};

</script>
