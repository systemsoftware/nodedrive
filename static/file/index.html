<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/style.css">
    <script src="../nav.js"></script>
        <script src="../fileactions.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<style>
ul {
    list-style-type: none;
    padding: 0;
    margin: 0;
}

li {
    padding: 12px 16px;
    cursor: pointer;

    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    
    transition: all 0.25s ease;

    border-radius: 8px;
}

/* Hover effect */
li:hover {
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    transform: translateX(4px);

    /* very subtle highlight without full background */
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
}

/* Optional: last item cleanup */
li:last-child {
    border-bottom: none;
}

select{
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(229, 229, 229, 0.305) !important;
    color: #000;
    transition: all 0.25s ease;
    outline: none;
    float: right;
    margin-right: 10px;
}

  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 40px;
    max-width: 1200px;
    margin: 0 auto;
    background: none;
  }


  iframe{
    border-radius: 15px;
     background: rgba(255, 255, 255, 0.1);
     backdrop-filter: blur(10px);
     box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
     border: 1px solid rgba(255, 255, 255, 0.3);
  }

</style>

<body>
<nav-bar>
</nav-bar>

<br><br>
    <div class="card" style="width: 90%;margin: auto;">
        <h2><span id="title">File</span></h2>
        <iframe id="fileframe" src="" style="width:100%; height:400px; border:none;"></iframe>
    </div><br>
    <div id="actions" class="card" style="width: 90%; margin: auto; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;">
        <button id="downloadBtn" onclick="download(drive, selPath)" title="Download"><span class="material-symbols-rounded">download</span></button>
        <button id="deleteBtn" onclick="ctx_delete()" title="Delete"><span class="material-symbols-rounded">delete</span></button>
        <button id="moveBtn" onclick="ctx_move()" title="Move"><span class="material-symbols-rounded">drive_file_move</span></button>
        <button id="copyBtn" onclick="ctx_copy_path()" title="Copy"><span class="material-symbols-rounded">content_copy</span></button>
        <button id="renameBtn" onclick="ctx_rename()" title="Rename"><span class="material-symbols-rounded">edit</span></button>
        <button id="shareBtn" onclick="ctx_share()" title="Share"><span class="material-symbols-rounded">share</span></button>
    </div>
        <div>
        <div class="dashboard-grid">
            <div class="card">
                <h3>Size</h3>
                <p id="size">Loading...</p>
            </div>
            <div class="card">
                <h3>Created</h3>
                <p id="created">Loading...</p>
            </div>
            <div class="card">
                <h3>Modified</h3>
                <p id="modified">Loading...</p>
            </div>
    </div>
</body>

<script>
const params = new URLSearchParams(window.location.search);
const selPath = params.get('path'); 
const drive = params.get('drive');

document.getElementById('fileframe').src = `/files/raw?drive=${encodeURIComponent(drive)}&path=${encodeURIComponent(selPath)}`;
document.getElementById('title').textContent = selPath.split('/').pop();

const bytesToHumanReadable = (bytes) => {
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    let i = 0;
    while (bytes >= 1024 && i < units.length - 1) {
        bytes /= 1024;
        i++;
    }
    return `${bytes.toFixed(2)} ${units[i]}`;
};

window.onload = async () => {
    document.title = selPath.split('/').pop() + " - NodeDrive";
    const res = await fetch(`/files/info?drive=${encodeURIComponent(drive)}&path=${encodeURIComponent(selPath)}`);
    const data = await res.json();
    document.getElementById('size').textContent = bytesToHumanReadable(data.size);
    document.getElementById('created').textContent = new Date(data.created).toLocaleString();
    document.getElementById('modified').textContent = new Date(data.modified).toLocaleString();
};
</script>
