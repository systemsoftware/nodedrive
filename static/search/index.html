<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/style.css">
    <script src="../nav.js"></script>
    <link rel="stylesheet" href="../icons.css">

</head>
<style>
ul {
    list-style-type: none;
    padding: 0;
    margin: 0;
}

li {
    padding: 12px 16px;
    cursor: pointer;

    /* Glass feel without background */
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    
    /* Subtle blur to interact with parent background */

    /* Smooth transitions */
    transition: all 0.25s ease;

    /* Slight rounding for modern look */
    border-radius: 8px;
}

/* Hover effect */
li:hover {
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    transform: translateX(4px);

    /* very subtle highlight without full background */
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
}

/* Optional: last item cleanup */
li:last-child {
    border-bottom: none;
}

select{
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(229, 229, 229, 0.305) !important;
    color: #000;
    transition: all 0.25s ease;
    outline: none;
    float: right;
    margin-right: 10px;
}

input{
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(229, 229, 229, 0.305) !important;
    color: #000;
    transition: all 0.25s ease;
    outline: none;
    margin: 10px 0 10px 0;
}
</style>

<body>
<nav-bar>
</nav-bar>

<br><br>


    <div class="card">
        <h2><span id="title">Search Files</span>
            
            <input type="file" id="file-input" style="display:none" onchange="uploadFile(event)" />
        <select id="drive-select">
            <option id="sel" value="sel">Select Drive</option>
        </select>
        </h2>
                    <input type="text" id="search-input" placeholder="Search..." onkeypress="if(event.key === 'Enter') search()" />
                    <button onclick="search()">Search</button>

        <ul>
        </ul>
    </div>
</body>
<script>
const bytesToHumanReadable = (bytes) => {
    if (bytes === 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    let i = Math.floor(Math.log(bytes) / Math.log(1024));
    return parseFloat((bytes / Math.pow(1024, i)).toFixed(2)) + ' ' + units[i];
};

let selPath = '';

window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const currentDrive = params.get('drive');

    // 1. Load Drives
    const drivesReq = await fetch('/drives');
    const drivesData = await drivesReq.json();
    const driveSelect = document.getElementById('drive-select');

    document.getElementById('search-input').value = params.get('q') || '';

    document.title = currentDrive ? `Search - ${currentDrive} - NodeDrive` : 'Search Files - NodeDrive';

    drivesData.drives.forEach(drive => {
        const option = document.createElement('option');
        option.value = drive.name;
        option.textContent = drive.name;
        if(currentDrive === drive.name) option.selected = true;
        driveSelect.appendChild(option);
    });

    if(!currentDrive) {
        document.getElementById('title').textContent = 'Please select a drive';
         return;
    }

        if(driveSelect.value == 'sel') return document.getElementById('title').textContent = 'Please select a drive';


    // 2. Load Files
    const req = await fetch(`/files/search/json?drive=${currentDrive}&q=${encodeURIComponent(params.get('q') || '')}`);
    const data = await req.json();
    const ul = document.querySelector('.card ul');

    if(!data.files) {
        ul.innerHTML = data.error || 'Error loading files';
        return;
    }

    data.files.forEach(file => {
        console.log(file);
        const fileLi = document.createElement('li');
        const icon = file.isDirectory ? '📁' : '📄';
        const info = file.isDirectory ? 'Directory' : bytesToHumanReadable(file.size);
        
        fileLi.innerHTML = `
            <span>${icon} <strong>${file.name}</strong></span>

        `;

        if(fileLi.textContent.trim().startsWith('.')) {
            fileLi.style.display = 'none';
        }

        fileLi.onclick = () => {
            console.log(file);
            if(file.isDirectory) {
                location.href = `?drive=${file.drive.name}&path=${encodeURIComponent(file.path)}`;
            } else {
                location.href = `/file?drive=${file.drive.name}&path=${encodeURIComponent(file.path)}`;
            }
        };

fileLi.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  
  selPath = file.path;
  
  menu.style.top = `${e.pageY}px`;
  menu.style.left = `${e.pageX}px`;
  menu.style.display = 'block';
});

document.addEventListener('click', () => {
  menu.style.display = 'none';
});


        ul.appendChild(fileLi);
    });
};

const search = () => {
    const query = document.getElementById('search-input').value.trim();
    if(!query) return;

    const drive = document.getElementById('drive-select').value;
    if(drive === 'sel') return alert('Please select a drive first');

    location.href = `?drive=${drive}&q=${encodeURIComponent(query)}`;
};
</script>
