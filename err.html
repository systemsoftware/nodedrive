<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="/style.css">
    <script src="/nav.js"></script>
    <title>Error</title>
  <style>

body{
    overflow: hidden;
}

.card{
    position: fixed !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
}

button{
    width: 48%;
}


  </style>
</head>
<body>
    <nav-bar>
    </nav-bar>
  <div class="card" style="max-width: 50%;">
    <h2>Error</h2>
    <p style="overflow: scroll;">%error%</p>
    <button onclick="window.history.back()">Go Back</button>
    <button id="b2" onclick="window.location.href='/'">Go Home</button>
  </div>
</body>


<script>
function copyText() {
    const text = document.querySelector('.card p').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert('Copied to clipboard!');
    }).catch(err => {
        alert('Failed to copy: ' + err);
    });
}

if(document.title == 'JWT Token') {
   const b2 = document.getElementById('b2');
   b2.innerText = 'Copy Token';
   b2.onclick = copyText;
}
</script>
